

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Digital Business Card</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #e8f5e9; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; width: 300px; border: 2px solid #2e7d32; }

        h2 { color: #2e7d32; margin: 10px 0; }
        p { color: #555; font-size: 14px; margin: 5px 0; }
        .btn-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn { text-decoration: none; padding: 12px; border-radius: 8px; color: white; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .call-btn { background-color: #2e7d32; }
        .wa-btn { background-color: #c62828; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://raw.githubusercontent.com/saikrishna555-web2026/my-card/main/saibaba.jpg" class="profile-img" alt="Sai Baba">

        <p>Digital Business Card</p>
        <div class="btn-container">
            <a href="tel:+918121403685" class="btn call-btn">📞 Call Me</a>
            <a href="https://wa.me/918121403685" class="btn wa-btn">💬 WhatsApp</a>
        </div>
    </div>
</body>
</html>
